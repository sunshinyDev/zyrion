name: streamhub
description: StreamHub - Modern Mobile Streaming Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.17.9
  firebase_database: ^10.4.9
  firebase_remote_config: ^4.3.8
  cloud_firestore: ^4.17.5

  # UI & Navigation
  go_router: ^13.2.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  carousel_slider: ^4.2.1
  flutter_animate: ^4.5.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Video Player
  video_player: 2.9.2
  chewie: 1.7.4

  # Utils
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  connectivity_plus: ^5.0.2
  dio: ^5.9.2
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  lottie: ^3.1.0
  package_info_plus: ^8.3.1
  open_file: ^3.5.4
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.11

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
