name: Build & Release APK

# Triggers on version tags: v1.0.0, v1.2.3, etc.
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build APK & Publish Release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Java ────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Setup Flutter ─────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      # ── 4. Extract version from tag ──────────────────────────────────────────
      - name: Extract version info
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          # version_name = tag without 'v' (e.g. 1.2.3)
          echo "version_name=$TAG" >> $GITHUB_OUTPUT
          # version_code = remove dots and use as integer (e.g. 123)
          CODE=$(echo "$TAG" | tr -d '.')
          echo "version_code=$CODE" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "Building version: $TAG (code: $CODE)"

      # ── 5. Update pubspec version ────────────────────────────────────────────
      - name: Update pubspec.yaml version
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.version_code }}/" pubspec.yaml
          echo "pubspec version updated:"
          grep "^version:" pubspec.yaml

      # ── 6. Write google-services.json ────────────────────────────────────────
      - name: Write google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      # ── 7. Write keystore (optional — uses debug key if not set) ─────────────
      - name: Setup signing
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
            cat >> android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF
            echo "Using release keystore"
          else
            echo "No keystore configured — using debug signing"
          fi

      # ── 8. Get dependencies ──────────────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 9. Build release APK ─────────────────────────────────────────────────
      - name: Build APK
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.version_name }} \
            --build-number=${{ steps.version.outputs.version_code }}

      # ── 10. Rename APK ───────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/zyrion-play-${{ steps.version.outputs.version_name }}.apk

      # ── 11. Create GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Zyrion Play ${{ steps.version.outputs.version_name }}"
          body: |
            ## Zyrion Play v${{ steps.version.outputs.version_name }}

            ### Instalação
            1. Baixe o APK abaixo
            2. Habilite "Fontes desconhecidas" no Android
            3. Instale o arquivo `.apk`

            ---
            *Build automático via GitHub Actions*
          files: |
            build/app/outputs/flutter-apk/zyrion-play-${{ steps.version.outputs.version_name }}.apk
          draft: false
          prerelease: false

      # ── 12. Update Firebase app_config/update ────────────────────────────────
      - name: Update Firebase with new version
        env:
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/zyrion-play-${{ steps.version.outputs.version_name }}.apk"
          
          PAYLOAD=$(cat <<EOF
          {
            "version_code": ${{ steps.version.outputs.version_code }},
            "version_name": "${{ steps.version.outputs.version_name }}",
            "download_url": "$APK_URL",
            "force_update": false,
            "changelog": "Versão ${{ steps.version.outputs.version_name }} disponível.",
            "published_at": $(date +%s000)
          }
          EOF
          )
          
          curl -s -X PUT \
            "${FIREBASE_DB_URL}/app_config/update.json?auth=${FIREBASE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
          
          echo "Firebase updated with version ${{ steps.version.outputs.version_name }}"
          echo "APK URL: $APK_URL"
