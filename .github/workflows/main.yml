name: ZyrionPlay EPG Engine

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar Dependências
        run: |
          npm init -y
          npm install axios

      - name: Executar Script de Redundância
        # AJUSTE AQUI: Entramos na pasta antes de rodar o node
        run: node zyrion/epg/update_epg.js

      - name: Salvar Alterações no GitHub
        run: |
          git config --global user.name "Zyrion-Bot"
          git config --global user.email "bot@zyrionplay.com"
          # Adiciona o ficheiro que foi gerado (verificar se o JS gera na raiz ou na pasta)
          git add . 
          git commit -m "Bot: EPG atualizado [$(date)]" || echo "Sem alterações"
          git push
