name: ZyrionPlay EPG Engine

on:
  schedule:
    # '0 * * * *' significa: Executar no minuto 0 de cada hora
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar Dependências
        run: |
          cd epg
          npm init -y
          npm install axios

      - name: Executar Script de Redundância
        run: node epg/update_epg.js

      - name: Salvar Alterações no GitHub
        run: |
          git config --global user.name "Zyrion-Bot"
          git config --global user.email "bot@zyrionplay.com"
          git add epg/epg_final.xml
          git commit -m "Bot: EPG atualizado de hora em hora [$(date)]" || echo "Sem alterações"
          git push
