name: ZyrionPlay EPG Engine

on:
  schedule:
    # '0 */12 * * *' significa: Executar às 00:00 e às 12:00 todos os dias
    - cron: '0 */12 * * *'
  workflow_dispatch: # Mantém isto para poderes testar manualmente se quiseres

jobs:
  update-epg:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Instalar Dependências
        run: npm install axios

      - name: Executar Script de Redundância
        run: node epg/update_epg.js

      - name: Salvar Alterações no GitHub
        run: |
          git config --global user.name "Zyrion-Bot"
          git config --global user.email "bot@zyrionplay.com"
          git add epg/epg_final.xml
          
          if git diff --staged --quiet; then
            echo "Sem mudanças no EPG. Pulando commit."
          else
            git commit -m "Bot: EPG atualizado (12h cycle) [$(date +'%Y-%m-%d %H:%M')]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
